window.computeScore = function(role, answers) {
  const dimScores = role.dimensions.map(dim => {
    const qs = role.questions.filter(q => q.dimensionId === dim.id);
    const vals = qs.map(q => answers[q.id] ?? 3);
    const avg = vals.reduce((a,b)=>a+b,0) / Math.max(vals.length, 1);
    const score = ((avg - 1) / 4) * 100;
    return { dim, avg, score, weighted: score * dim.weight };
  });
  const total = Math.round(dimScores.reduce((a,d)=>a+d.weighted, 0));
  const tier = window.DIAGNOSTIC_DATA.tiers.find(t => total >= t.min && total <= t.max)
    || window.DIAGNOSTIC_DATA.tiers[window.DIAGNOSTIC_DATA.tiers.length - 1];
  return { dimScores, total, tier };
};

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight-(ev.clientX-sx), y: startBottom-(ev.clientY-sy) };
      panel.style.right = Math.max(8, offsetRef.current.x)+'px';
      panel.style.bottom = Math.max(8, offsetRef.current.y)+'px';
    };
    const up = () => { window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {
  return <><div className="twk-sect">{title}</div>{children}</>;
}

function TweakToggle({ label, checked, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={checked ? '1' : '0'}
              onClick={() => onChange(!checked)}><i/></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-seg">
        <div className="twk-seg-thumb" style={{ left:`calc(2px + ${idx} * (100% - 4px) / ${n})`, width:`calc((100% - 4px) / ${n})` }}/>
        {opts.map(o => (
          <button key={o.value} type="button" onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

function TweakColor({ label, value, options, onChange }) {
  const key = o => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-chips">
        {options.map((o, i) => {
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip"
                    data-on={on ? '1' : '0'}
                    style={{ background: o }}
                    onClick={() => onChange(o)}>
              {on && (
                <svg viewBox="0 0 14 14"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
                  strokeLinecap="round" strokeLinejoin="round" stroke="rgba(0,0,0,.7)"/></svg>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function TweakButton({ label, onClick }) {
  return <button type="button" className="twk-btn" onClick={onClick}>{label}</button>;
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakRadio, TweakColor, TweakButton });
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

function Badge({ children, tone = "green", icon = true }) {
  const tones = {
    green: { bg: "var(--accent-soft)", fg: "var(--accent-ink)" },
    dark:  { bg: "var(--ink-1)", fg: "var(--surface)" },
    light: { bg: "var(--surface)", fg: "var(--ink-1)" }
  };
  const t = tones[tone] || tones.green;
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:6,
      padding:"5px 10px 5px 8px", borderRadius:999,
      background:t.bg, color:t.fg,
      fontSize:12, fontWeight:500, letterSpacing:"-0.005em", lineHeight:1
    }}>
      {icon && (
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 9 L5 5 L7 7 L10 3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          <path d="M7 3 L10 3 L10 6" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {children}
    </span>
  );
}

function Card({ children, style={}, padding=32, interactive, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: interactive && hover ? "var(--surface-hover)" : "var(--surface)",
        borderRadius:24, padding,
        transition:"transform 220ms cubic-bezier(.2,.7,.2,1), background 220ms",
        cursor: interactive ? "pointer" : "default",
        transform: interactive && hover ? "translateY(-2px)" : "none",
        ...style
      }}>
      {children}
    </div>
  );
}

const SLIDER_GRADIENTS = {
  warm:       "linear-gradient(90deg, #FFB199 0%, #FF9A6B 35%, #FFC25C 70%, #FFD66B 100%)",
  yellowBlue: "linear-gradient(90deg, #F2D86B 0%, #E8C268 30%, #9BC2D8 65%, #7FB6D4 100%)",
  blueGreen:  "linear-gradient(90deg, #5FA8E0 0%, #7CB7DE 35%, #9BD2A5 70%, #B5DC95 100%)",
  green:      "linear-gradient(90deg, #C5E8B8 0%, #8FD27A 50%, #5BBE5B 100%)",
  mono:       "linear-gradient(90deg, #1F1F1F 0%, #4A4A4A 50%, #8A8A8A 100%)"
};

function GradientSlider({ value, onChange, gradient, label1, label5 }) {
  const railRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const pct = ((value - 1) / 4) * 100;

  const updateFromX = (clientX) => {
    const rect = railRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const v = Math.round(1 + (x / rect.width) * 4);
    onChange(Math.max(1, Math.min(5, v)));
  };

  useEffect(() => {
    if (!dragging) return;
    const mv = (e) => updateFromX(e.clientX ?? e.touches?.[0]?.clientX);
    const up = () => setDragging(false);
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", mv);
    window.addEventListener("touchend", up);
    return () => {
      window.removeEventListener("mousemove", mv);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", mv);
      window.removeEventListener("touchend", up);
    };
  }, [dragging]);

  return (
    <div style={{ width:"100%" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:13, color:"var(--ink-2)", marginBottom:10, fontWeight:400 }}>
        <span>{label1 || "Low"}</span>
        <span style={{ position:"relative", flex:1, margin:"0 12px", height:1 }}>
          <span style={{ position:"absolute", left:`calc(${pct}% - 6px)`, top:-3, transition: dragging ? "none" : "left 280ms cubic-bezier(.2,.7,.2,1)" }}>
            <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
              <path d="M6 8 L0 0 L12 0 Z" fill="var(--ink-1)"/>
            </svg>
          </span>
        </span>
        <span>{label5 || "High"}</span>
      </div>

      <div ref={railRef}
        onMouseDown={(e) => { setDragging(true); updateFromX(e.clientX); }}
        onTouchStart={(e) => { setDragging(true); updateFromX(e.touches[0].clientX); }}
        style={{ position:"relative", height:56, cursor:"pointer", userSelect:"none", touchAction:"none" }}>
        <div style={{ position:"absolute", inset:0, display:"grid", gridTemplateColumns:"1fr 1fr", gap:4 }}>
          <div style={{ background:gradient, borderRadius:"999px", opacity: value >= 1 ? 1 : 0.35, transition:"opacity 220ms" }}/>
          <div style={{ background:gradient, borderRadius:"999px", opacity: value >= 3 ? 1 : 0.35, transition:"opacity 220ms", backgroundPosition:"right", backgroundSize:"200% 100%" }}/>
        </div>
        <div style={{ position:"absolute", left:0, right:0, top:0, bottom:0, display:"flex", justifyContent:"space-between", padding:"0 20px", pointerEvents:"none" }}>
          {[1,2,3,4,5].map(n => (
            <div key={n} style={{ width:6, height:6, alignSelf:"center", borderRadius:999,
              background: n <= value ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.35)",
              boxShadow: n <= value ? "0 0 0 2px rgba(0,0,0,0.06)" : "none",
              transition:"background 220ms"
            }}/>
          ))}
        </div>
      </div>

      <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8 }}>
        {[1,2,3,4,5].map(n => (
          <button key={n} onClick={() => onChange(n)} style={{
            border:"none",
            background: n === value ? "var(--ink-1)" : "transparent",
            color: n === value ? "var(--surface)" : "var(--ink-2)",
            padding:"6px 0", borderRadius:8, fontSize:12, fontWeight:500,
            fontFamily:"inherit", cursor:"pointer", transition:"all 180ms"
          }}>{n}</button>
        ))}
      </div>
    </div>
  );
}

function StatNumber({ value, suffix="%", size=96 }) {
  return (
    <div style={{ fontSize:size, fontWeight:400, letterSpacing:"-0.04em", lineHeight:1, color:"var(--ink-1)", fontFamily:"var(--font-display)" }}>
      {value}
      <span style={{ fontSize:size*0.55, color:"var(--ink-3)", marginLeft:2, fontWeight:400 }}>{suffix}</span>
    </div>
  );
}

function RoleCard({ role, index, selected, onSelect, onStart }) {
  return (
    <Card interactive onClick={() => onSelect(role.id)} style={{
      outline: selected ? "2px solid var(--ink-1)" : "2px solid transparent",
      outlineOffset:-2,
      padding:28,
      display:"flex", flexDirection:"column", justifyContent:"space-between",
      minHeight:240
    }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <Badge>{role.yearsExperience}</Badge>
        <span style={{ fontSize:13, color:"var(--ink-3)", letterSpacing:"-0.005em" }}>0{index+1}</span>
      </div>
      <div>
        <div style={{ fontSize:28, fontWeight:400, letterSpacing:"-0.025em", lineHeight:1.1, color:"var(--ink-1)", fontFamily:"var(--font-display)", marginBottom:8 }}>{role.name}</div>
        <div style={{ fontSize:14, color:"var(--ink-2)", lineHeight:1.4 }}>{role.description}</div>
      </div>
      {selected && onStart ? (
        <button onClick={(e) => { e.stopPropagation(); onStart(role.id); }} style={{
          width:"100%", background:"var(--ink-1)", color:"var(--surface)",
          border:"none", borderRadius:12, padding:"14px 20px", fontSize:14, fontWeight:600,
          fontFamily:"inherit", cursor:"pointer", marginTop:20,
          display:"flex", alignItems:"center", justifyContent:"center", gap:8, transition:"opacity 150ms"
        }}>
          Start diagnostic
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 7 H11 M8 4 L11 7 L8 10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      ) : (
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12, color:"var(--ink-3)", marginTop:24 }}>
          <span>{role.dimensions.length} dimensions · {role.questions.length} questions</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M5 3 L11 8 L5 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      )}
    </Card>
  );
}

function AvatarCluster({ count=5 }) {
  const colors = ["#FFB199","#F2D86B","#9BC2D8","#B5DC95","#D8B6E8"];
  return (
    <div style={{ display:"flex" }}>
      {Array.from({length:count}).map((_,i) => (
        <div key={i} style={{ width:22, height:22, borderRadius:999, background:colors[i%colors.length], border:"2px solid var(--bg)", marginLeft:i===0?0:-7, boxShadow:"0 1px 2px rgba(0,0,0,0.08)" }}/>
      ))}
    </div>
  );
}

Object.assign(window, { Badge, Card, GradientSlider, StatNumber, RoleCard, AvatarCluster, SLIDER_GRADIENTS });
</script>

function QuestionsScreen({ role, answers, setAnswers, onBack, onFinish, tweaks, isMobile }) {

        {q.text}

        <button onClick={prev} style={{ background:"transparent", border:"1px solid var(--rail)", padding:"12px 18px", borderRadius:999, color:"var(--ink-1)", fontFamily:"inherit", fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M11 7 H3 M6 4 L3 7 L6 10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          {idx === 0 ? "Back" : "Prev"}
        </button>
        <button onClick={next} style={{ background:"var(--ink-1)", color:"var(--surface)", border:"none", padding:"13px 22px", borderRadius:999, fontFamily:"inherit", fontSize:14, fontWeight:500, cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
          {idx === total-1 ? "See results" : "Next"}
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 7 H11 M8 4 L11 7 L8 10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

function DimensionResult({ ds, gradient }) {
  const pct = Math.round(ds.score);
  return (
    <div>
      <div style={{ marginBottom:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"var(--ink-2)", marginBottom:8 }}>
          <span>0%</span>
          <span style={{ position:"relative", flex:1, margin:"0 12px", height:1 }}>
            <span style={{ position:"absolute", left:`calc(${pct}% - 6px)`, top:-3, transition:"left 720ms cubic-bezier(.2,.7,.2,1)" }}>
              <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                <path d="M6 8 L0 0 L12 0 Z" fill="var(--ink-1)"/>
              </svg>
            </span>
          </span>
          <span>100%</span>
        </div>
        <div style={{ position:"relative", height:44 }}>
          <div style={{ position:"absolute", inset:0, borderRadius:999, background:"var(--rail)" }}/>
          <div style={{ position:"absolute", top:0, bottom:0, left:0, width:`${pct}%`, borderRadius:999, background:gradient, transition:"width 720ms cubic-bezier(.2,.7,.2,1)" }}/>
        </div>
      </div>
      <StatNumber value={pct} size={84}/>
      <div style={{ marginTop:16, fontSize:16, fontWeight:500, color:"var(--ink-1)", letterSpacing:"-0.01em" }}>{ds.dim.name}</div>
      <div style={{ fontSize:13, color:"var(--ink-2)", marginTop:4, lineHeight:1.4 }}>{ds.dim.description}</div>
      <div style={{ marginTop:12, display:"flex", gap:12, alignItems:"center", fontSize:12, color:"var(--ink-3)" }}>
        <span>Weight {(ds.dim.weight*100).toFixed(0)}%</span>
        <span style={{ opacity:0.4 }}>·</span>
        <span>Avg {ds.avg.toFixed(1)} / 5</span>
      </div>
    </div>
  );
}

function ResultsScreen({ role, answers, onRestart, onReview, tweaks, isMobile }) {
  const result = React.useMemo(() => window.computeScore(role, answers), [role, answers]);
  const tierIdx = window.DIAGNOSTIC_DATA.tiers.findIndex(t => t.label === result.tier.label);
  const gradients = [SLIDER_GRADIENTS.warm, SLIDER_GRADIENTS.yellowBlue, SLIDER_GRADIENTS.blueGreen, SLIDER_GRADIENTS.green];
  const [saved, setSaved] = React.useState(false);

  // Save to Supabase once on mount
  React.useEffect(() => {
    const dimScoresPayload = result.dimScores.map(ds => ({
      dimension: ds.dim.name, score: Math.round(ds.score), avg: ds.avg, weight: ds.dim.weight
    }));
    window.saveResult({
      role_id: role.id,
      role_name: role.name,
      total_score: result.total,
      tier_label: result.tier.label,
      answers: answers,
      dimension_scores: dimScoresPayload
    }).then(() => setSaved(true));
  }, []);

  // WhatsApp message with results
  const waMessage = encodeURIComponent(
    `Hi Shaik! I just completed your Strategic Readiness Diagnostic.\n\n` +
    `Role: ${role.name}\n` +
    `Score: ${result.total}/100\n` +
    `Tier: ${result.tier.label}\n\n` +
    result.dimScores.map(ds => `• ${ds.dim.name}: ${Math.round(ds.score)}%`).join('\n') +
    `\n\nWould love to discuss my results!`
  );
  const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${waMessage}`;

  return (
    <div style={{ maxWidth:1280, margin:"0 auto", padding: isMobile ? "28px 20px 64px" : "48px 48px 96px" }}>
      {/* Title row */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom: isMobile ? 24 : 48 }}>
        <div style={{ flex:1 }}>
          <Badge>{role.name} · Result</Badge>
          <h1 style={{ fontSize: isMobile ? 36 : 88, fontWeight:400, letterSpacing:"-0.04em", margin:"16px 0 8px", lineHeight:1, fontFamily:"var(--font-display)" }}>
            Your readiness
          </h1>
          <p style={{ fontSize: isMobile ? 14 : 17, color:"var(--ink-2)", margin:"8px 0 0" }}>
            Scored across {role.dimensions.length} dimensions · {role.questions.length} questions.
          </p>
        </div>
        <Badge tone="dark" icon={false}>{result.tier.label}</Badge>
      </div>

      {/* Hero score block */}
      <Card padding={isMobile ? 24 : 48} style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "1.1fr 1fr", gap: isMobile ? 24 : 48, marginBottom:24, background:"var(--ink-1)", color:"var(--surface)" }}>
        <div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:16, fontWeight:500 }}>Overall score</div>
          <div style={{ fontSize: isMobile ? 96 : 220, fontWeight:400, letterSpacing:"-0.05em", lineHeight:0.9, fontFamily:"var(--font-display)", color:"var(--surface)" }}>
            {result.total}
            <span style={{ fontSize: isMobile ? 48 : 120, color:"rgba(255,255,255,0.4)", fontWeight:400 }}>%</span>
          </div>
          <div style={{ marginTop:16, fontSize: isMobile ? 15 : 18, color:"rgba(255,255,255,0.8)" }}>
            {result.tier.message}.
          </div>
        </div>

        {/* Tier ladder */}
        <div style={{ display:"flex", flexDirection:"column", justifyContent:"center", gap:8 }}>
          {window.DIAGNOSTIC_DATA.tiers.map((t,i) => {
            const active = i === tierIdx;
            return (
              <div key={t.label} style={{ display:"flex", alignItems:"center", gap:12, padding: isMobile ? "12px 14px" : "16px 20px", background: active ? "rgba(255,255,255,0.08)" : "transparent", border: active ? "1px solid rgba(255,255,255,0.2)" : "1px solid rgba(255,255,255,0.06)", borderRadius:12, transition:"all 280ms" }}>
                <div style={{ width:28, height:28, borderRadius:999, background: active ? "var(--accent)" : "rgba(255,255,255,0.06)", color: active ? "#0A0A0A" : "rgba(255,255,255,0.5)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:600, flexShrink:0 }}>{i+1}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:500, color: active ? "#fff" : "rgba(255,255,255,0.6)" }}>{t.label}</div>
                  {!isMobile && <div style={{ fontSize:12, color: active ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.4)" }}>{t.message}</div>}
                </div>
                <div style={{ fontSize:11, color: active ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.3)", fontVariantNumeric:"tabular-nums", flexShrink:0 }}>{t.min}–{t.max}</div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Dimension breakdown */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", margin: isMobile ? "32px 0 20px" : "56px 0 28px" }}>
        <h2 style={{ fontSize: isMobile ? 32 : 56, fontWeight:400, letterSpacing:"-0.035em", margin:0, fontFamily:"var(--font-display)" }}>Dimensions</h2>
        {!isMobile && <Badge tone="dark" icon={false}>{result.dimScores.length} dimensions</Badge>}
      </div>

      <div style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : `repeat(${result.dimScores.length},1fr)`, gap: isMobile ? 24 : 32 }}>
        {result.dimScores.map((ds,i) => (
          <DimensionResult key={ds.dim.id} ds={ds} gradient={tweaks.monoSliders ? SLIDER_GRADIENTS.mono : gradients[i % gradients.length]}/>
        ))}
      </div>

      {/* Footer actions */}
      <div style={{ display:"flex", flexDirection: isMobile ? "column" : "row", justifyContent:"space-between", alignItems: isMobile ? "stretch" : "center", marginTop: isMobile ? 40 : 64, padding: isMobile ? "20px" : "20px 28px", background:"var(--surface)", borderRadius:20, gap:16 }}>
        <div>
          <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:4 }}>What's next?</div>
          <div style={{ fontSize: isMobile ? 15 : 17, color:"var(--ink-1)", fontWeight:500 }}>Chat with Shaik about your results.</div>
        </div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
          <button onClick={onReview} style={{ background:"transparent", border:"1px solid var(--rail)", padding:"11px 18px", borderRadius:999, color:"var(--ink-1)", fontFamily:"inherit", fontSize:13, cursor:"pointer", flex: isMobile ? 1 : "none" }}>
            Review
          </button>
          <button onClick={onRestart} style={{ background:"transparent", border:"1px solid var(--rail)", padding:"11px 18px", borderRadius:999, color:"var(--ink-1)", fontFamily:"inherit", fontSize:13, cursor:"pointer", flex: isMobile ? 1 : "none" }}>
            Restart
          </button>
          <a href={waUrl} target="_blank" rel="noopener noreferrer" style={{
            display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8,
            background:"#25D366", color:"#fff", border:"none", padding:"11px 20px", borderRadius:999,
            fontFamily:"inherit", fontSize:14, fontWeight:600, cursor:"pointer", textDecoration:"none",
            boxShadow:"0 2px 12px rgba(37,211,102,0.35)", flex: isMobile ? 1 : "none"
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Chat on WhatsApp
          </a>
        </div>
      </div>

      {saved && (
        <div style={{ textAlign:"center", marginTop:12, fontSize:12, color:"var(--ink-3)" }}>
          ✓ Results saved
        </div>
      )}
    </div>
  );
}

Object.assign(window, { WelcomeScreen, QuestionsScreen, ResultsScreen });
</script>

<!-- ── APP ── -->
<script type="text/babel">
const TWEAK_DEFAULTS = {
  accent: "#16C063",
  monoSliders: false,
  dark: false,
  fontStack: "Helvetica"
};

function useIsMobile() {
  const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);
  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return isMobile;
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState("welcome");
  const [roleId, setRoleId] = React.useState(null);
  const [answers, setAnswers] = React.useState({});
  const isMobile = useIsMobile();
  const role = roleId ? window.DIAGNOSTIC_DATA.roles.find(r => r.id === roleId) : null;

  React.useEffect(() => {
    const root = document.documentElement;
    const dark = !!tweaks.dark;
    root.style.setProperty("--bg",            dark ? "#0E0E0D" : "#F1F1EF");
    root.style.setProperty("--surface",       dark ? "#1A1A1A" : "#FFFFFF");
    root.style.setProperty("--surface-hover", dark ? "#222222" : "#FCFCFB");
    root.style.setProperty("--ink-1",         dark ? "#F4F4F2" : "#0E0E0D");
    root.style.setProperty("--ink-2",         dark ? "#A3A39E" : "#6B6B66");
    root.style.setProperty("--ink-3",         dark ? "#6A6A66" : "#9F9F9A");
    root.style.setProperty("--rail",          dark ? "#2A2A28" : "#E6E6E2");
    root.style.setProperty("--accent",        tweaks.accent || "#16C063");
    root.style.setProperty("--accent-soft",   dark ? "rgba(34,194,118,0.18)" : "#E4F5E8");
    root.style.setProperty("--accent-ink",    dark ? "#9FE3B6" : "#1B7A3D");
    const fontMap = {
      "Helvetica": '"Helvetica Neue", "Helvetica", "Arial", sans-serif',
      "Grotesk":   '"Space Grotesk", "Helvetica Neue", sans-serif'
    };
    root.style.setProperty("--font-display", fontMap[tweaks.fontStack] || fontMap.Helvetica);
    root.style.setProperty("--font-body",    fontMap[tweaks.fontStack] || fontMap.Helvetica);
  }, [tweaks.dark, tweaks.accent, tweaks.fontStack]);

  const start = (id) => { setRoleId(id); setAnswers({}); setScreen("questions"); };
  const finish = () => setScreen("results");
  const restart = () => { setScreen("welcome"); setRoleId(null); setAnswers({}); };
  const review = () => setScreen("questions");

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", color:"var(--ink-1)", fontFamily:"var(--font-body)", transition:"background 320ms, color 320ms" }}>
      {screen === "welcome" && <WelcomeScreen onStart={start} tweaks={tweaks} isMobile={isMobile}/>}
      {screen === "questions" && role && (
        <QuestionsScreen role={role} answers={answers} setAnswers={setAnswers} onBack={() => setScreen("welcome")} onFinish={finish} tweaks={tweaks} isMobile={isMobile}/>
      )}
      {screen === "results" && role && (
        <ResultsScreen role={role} answers={answers} onRestart={restart} onReview={review} tweaks={tweaks} isMobile={isMobile}/>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio label="Mode" value={tweaks.dark ? "dark" : "light"}
            onChange={(v) => setTweak("dark", v === "dark")}
            options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
          <TweakColor label="Accent" value={tweaks.accent}
            onChange={(v) => setTweak("accent", v)}
            options={["#16C063","#E07A2F","#3F6EE3","#9B59E6"]}/>
        </TweakSection>
        <TweakSection title="Slider style">
          <TweakToggle label="Mono sliders" checked={!!tweaks.monoSliders} onChange={(v) => setTweak("monoSliders", v)}/>
        </TweakSection>
        <TweakSection title="Typography">
          <TweakRadio label="Display" value={tweaks.fontStack}
            onChange={(v) => setTweak("fontStack", v)}
            options={[{value:"Helvetica",label:"Helvetica"},{value:"Grotesk",label:"Grotesk"}]}/>
        </TweakSection>
        <TweakSection title="Session">
          <TweakButton label="Restart from welcome" onClick={restart}/>
          <TweakButton label="Randomize answers" onClick={() => {
            if (!role) return;
            const next = {};
            role.questions.forEach(q => { next[q.id] = 1 + Math.floor(Math.random()*5); });
            setAnswers(next);
          }}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
